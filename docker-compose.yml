services:

  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: azora-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-azora}
      POSTGRES_USER:     ${POSTGRES_USER:-azora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - azora-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-azora}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js app ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CHAIN_ID:                   ${NEXT_PUBLIC_CHAIN_ID:-97}
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:   ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
        NEXT_PUBLIC_APP_URL:                    ${NEXT_PUBLIC_APP_URL:-https://azora.aasanhai.pk}
    image: azora-app:latest
    container_name: azora-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:                               production
      DATABASE_URL:                           postgresql://${POSTGRES_USER:-azora}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-azora}
      JWT_SECRET:                             ${JWT_SECRET}
      NEXT_PUBLIC_CHAIN_ID:                   ${NEXT_PUBLIC_CHAIN_ID:-97}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:   ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
      NEXT_PUBLIC_APP_URL:                    ${NEXT_PUBLIC_APP_URL:-https://azora.aasanhai.pk}
    networks:
      - azora-net

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: azora-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - azora-net

  # ── Certbot (SSL certificate renewal) ─────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: azora-certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"
    networks:
      - azora-net

volumes:
  postgres_data:
  letsencrypt:
  certbot_www:

networks:
  azora-net:
    driver: bridge
